services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-research-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-research-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped